<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex FF Mini - Red Social</title>
    <style>
        /* ESTILOS BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background-color: #000 !important; 
            background-image: url('https://i.ibb.co/9mNXSgKH/FB-IMG-1774065414386.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            overflow-x: hidden; 
            padding-bottom: 80px; 
        }
        
        header { padding: 30px; text-align: center; }
        .foto-perfil { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 3px solid #00f2ff; margin: 0 auto; 
            box-shadow: 0 0 15px #00f2ff; object-fit: cover;
            display: block; background: #111;
        }
        
        h1 { margin-top: 15px; font-size: 24px; text-shadow: 0 0 10px #00f2ff, 2px 2px 5px #000; }
        #contenido { min-height: 300px; padding: 10px; }

        .btn-red { 
            display: block; width: 90%; margin: 15px auto; padding: 20px; 
            background: linear-gradient(45deg, rgba(0, 242, 255, 0.8), rgba(0, 123, 255, 0.8)); 
            color: white; font-weight: bold; text-decoration: none; 
            text-align: center; border-radius: 15px; border: none; font-size: 18px;
            backdrop-filter: blur(2px);
        }

        /* CHAT */
        .caja-chat { background: rgba(10, 10, 10, 0.9); height: 350px; border-radius: 15px; border: 1px solid #1a1a1a; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .msg { background: #161616; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid #00f2ff; position: relative; }
        
        /* GALERIA */
        .grid-fotos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .post-foto { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .post-foto img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .post-info { padding: 5px; font-size: 10px; color: #00f2ff; text-align: center; background: #000; }

        /* MENÚ */
        .menu { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a0a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
        .menu button { background: none; border: none; color: white; font-size: 12px; }
    </style>
</head>
<body onclick="playMusica()">

    <audio id="audioFondo" loop>
        <source src="https://files.catbox.moe/k6ejya.m4a" type="audio/x-m4a">
    </audio>

    <header id="cabecera">
        <img src="https://i.ibb.co/dJb3RzHk/FB-IMG-1774065361599.jpg" class="foto-perfil">
        <h1>@503_alex_ff_mini</h1>
    </header>

    <main id="contenido">
        <a href="https://www.tiktok.com/@503_alex_ff_mini" target="_blank" class="btn-red">TIKTOK OFICIAL</a>
        <a href="#" class="btn-red" style="background: linear-gradient(45deg, rgba(240, 148, 51, 0.8), rgba(230, 104, 60, 0.8));">INSTAGRAM</a>
        <button onclick="pausar()" class="btn-red" style="background: rgba(34, 34, 34, 0.8); font-size: 14px;">⚙️ PAUSAR PÁGINA</button>
    </main>

    <nav class="menu">
        <button onclick="mostrar('inicio')">🏠<br>Inicio</button>
        <button onclick="mostrar('fotos')">🖼️<br>Fotos</button>
        <button onclick="mostrar('chat')">💬<br>Chat</button>
        <button onclick="mostrar('publicar')">➕<br>Publicar</button>
    </nav>

    <script>
        let nombre = localStorage.getItem('nombreUsuario') || "";
        let musica = document.getElementById('audioFondo');
        let enInicio = true;

        function playMusica() { if (enInicio && musica.paused) { musica.play(); } }

        function mostrar(seccion) {
            const cont = document.getElementById('contenido');
            const cabecera = document.getElementById('cabecera');
            if(seccion === 'inicio') { location.reload(); return; }
            
            enInicio = false;
            document.body.style.backgroundImage = "none";
            cabecera.style.display = "none";
            musica.pause();
            
            if(seccion === 'chat') {
                if(!nombre) { nombre = prompt("Tu nombre:"); localStorage.setItem('nombreUsuario', nombre); }
                cont.innerHTML = `
                    <h2 style="text-align:center; color:#00f2ff; margin-bottom:10px;">Chat Global</h2>
                    <div id="caja" class="caja-chat">${localStorage.getItem('historialChat') || ''}</div>
                    <div style="display:flex; gap:5px;"><input type="text" id="ins" placeholder="Escribe..."><button onclick="enviar()" style="background:#00f2ff; border:none; border-radius:10px; width:50px;">🚀</button></div>
                `;
            }

            if(seccion === 'fotos') {
                cont.innerHTML = `<h2 style="text-align:center; color:#00f2ff;">Galería Real</h2><div class="grid-fotos">${localStorage.getItem('muroFotos') || '<p>Aún no hay fotos</p>'}</div>`;
            }

            if(seccion === 'publicar') {
                if(!nombre) { nombre = prompt("Tu nombre:"); localStorage.setItem('nombreUsuario', nombre); }
                cont.innerHTML = `
                    <h2 style="text-align:center; color:#00f2ff; margin-bottom:20px;">Subir Foto Normal</h2>
                    <div style="text-align:center; background:#111; padding:30px; border-radius:20px; border:1px dashed #00f2ff;">
                        <p style="margin-bottom:20px;">Selecciona una foto de tu celular:</p>
                        <input type="file" id="archivoFoto" accept="image/*" style="display:none;">
                        <button onclick="document.getElementById('archivoFoto').click()" class="btn-red" style="width:100%; background:#222;">📁 ABRIR GALERÍA</button>
                        <div id="vistaPrevia" style="margin-top:15px;"></div>
                        <button id="btnSubir" onclick="procesarFoto()" class="btn-red" style="display:none; width:100%;">✅ PUBLICAR AHORA</button>
                    </div>
                `;
                
                document.getElementById('archivoFoto').addEventListener('change', function(e) {
                    const reader = new FileReader();
                    reader.onload = function(){
                        document.getElementById('vistaPrevia').innerHTML = `<img src="${reader.result}" style="width:100%; border-radius:10px;">`;
                        document.getElementById('btnSubir').style.display = "block";
                    };
                    reader.readAsDataURL(e.target.files[0]);
                });
            }
        }

        function procesarFoto() {
            const imgData = document.querySelector('#vistaPrevia img').src;
            const galeriaAnterior = localStorage.getItem('muroFotos') || "";
            const nuevaPublicacion = `
                <div class="post-foto">
                    <img src="${imgData}">
                    <div class="post-info">Publicado por: @${nombre}</div>
                </div>`;
            localStorage.setItem('muroFotos', nuevaPublicacion + galeriaAnterior);
            alert("¡Foto subida con éxito! ✅");
            mostrar('fotos');
        }

        function enviar() {
            let i = document.getElementById('ins');
            let c = document.getElementById('caja');
            if(i.value) {
                c.innerHTML += `<div class="msg"><b>@${nombre}:</b><br>${i.value}</div>`;
                localStorage.setItem('historialChat', c.innerHTML);
                i.value = "";
                c.scrollTop = c.scrollHeight;
            }
        }

        function pausar() { if(prompt("Clave:") === "123") document.body.innerHTML = "<h1>PAUSADA</h1>"; }
    </script>
</body>
</html>
