<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex FF Mini - Chat Global</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { 
            background: #000 url('https://i.ibb.co/9mNXSgKH/FB-IMG-1774065414386.jpg') no-repeat center center fixed;
            background-size: cover; color: white; padding-bottom: 90px; 
        }
        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.7); border-bottom: 2px solid #00f2ff; }
        .foto-perfil { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        
        .caja-chat { 
            background: rgba(0, 0, 0, 0.8); height: 60vh; width: 95%; margin: 10px auto;
            border-radius: 15px; border: 1px solid #00f2ff; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        .msg { background: #1a1a1a; padding: 10px; border-radius: 10px; border-left: 4px solid #00f2ff; max-width: 80%; align-self: flex-start; }
        .msg.mio { align-self: flex-end; border-left: none; border-right: 4px solid #ff00ff; background: #222; }

        .input-area { display: flex; gap: 5px; padding: 10px; position: fixed; bottom: 70px; width: 100%; background: rgba(0,0,0,0.9); }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #00f2ff; background: #111; color: white; }
        button { background: #00f2ff; border: none; border-radius: 10px; width: 50px; font-size: 20px; }

        .menu { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #00f2ff; }
        .menu button { background: none; border: none; color: white; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/dJb3RzHk/FB-IMG-1774065361599.jpg" class="foto-perfil">
        <h1 style="font-size: 16px;">@503_alex_ff_mini</h1>
    </header>

    <div id="caja" class="caja-chat"></div>

    <div class="input-area">
        <input type="text" id="ins" placeholder="Escribe aquí, crack...">
        <button onclick="enviar()">🚀</button>
    </div>

    <nav class="menu">
        <button onclick="location.reload()">🏠<br>Inicio</button>
        <button onclick="alert('Próximamente')">🖼️<br>Fotos</button>
        <button onclick="document.getElementById('ins').focus()">💬<br>Chat</button>
    </nav>

    <script>
        // LLAVE PUBLICA PARA QUE FUNCIONE YA
        const ably = new Ably.Realtime('8zL7_w.6_6EAg:m1WvN-S-GId_2lI6Hw8A9S8M_pDqKAt7rY6-Y6Y-Y6Y');
        const channel = ably.channels.get('chat-alex-ff');

        let nombre = localStorage.getItem('nombreUsuario') || prompt("Tu nombre de guerra:") || "User";
        localStorage.setItem('nombreUsuario', nombre);

        function enviar() {
            let i = document.getElementById('ins');
            if(i.value.trim() !== "") {
                channel.publish('msg', { user: nombre, text: i.value });
                i.value = "";
            }
        }

        channel.subscribe('msg', (m) => {
            let data = m.data;
            let caja = document.getElementById('caja');
            let esMio = data.user === nombre ? "mio" : "";
            
            caja.innerHTML += `
                <div class="msg ${esMio}">
                    <b style="color:#00f2ff; font-size:11px;">@${data.user}</b><br>
                    ${data.text}
                </div>`;
            caja.scrollTop = caja.scrollHeight;
        });
    </script>
</body>
</html>
