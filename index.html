<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex FF Mini - Chat Real</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { 
            background: #000 url('https://i.ibb.co/9mNXSgKH/FB-IMG-1774065414386.jpg') no-repeat center center fixed;
            background-size: cover; color: white; padding-bottom: 80px; 
        }
        header { padding: 20px; text-align: center; background: rgba(0,0,0,0.6); }
        .foto-perfil { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00f2ff; box-shadow: 0 0 15px #00f2ff; object-fit: cover; }
        
        #contenido { padding: 10px; }
        .caja-chat { background: rgba(10, 10, 10, 0.9); height: 400px; border-radius: 15px; border: 1px solid #00f2ff; overflow-y: auto; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { background: #161616; padding: 10px; border-radius: 10px; border-left: 4px solid #00f2ff; max-width: 85%; align-self: flex-start; animation: aparecer 0.3s ease; }
        .msg.mio { align-self: flex-end; border-left: none; border-right: 4px solid #ff00ff; background: #222; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-area { display: flex; gap: 8px; position: fixed; bottom: 85px; width: 95%; left: 2.5%; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #00f2ff; background: #111; color: white; outline: none; }
        button.send { background: #00f2ff; border: none; border-radius: 12px; width: 60px; font-weight: bold; color: black; }

        .menu { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a0a; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #00f2ff; }
        .menu button { background: none; border: none; color: white; font-size: 12px; }
    </style>
</head>
<body>

    <header id="cabecera">
        <img src="https://i.ibb.co/dJb3RzHk/FB-IMG-1774065361599.jpg" class="foto-perfil">
        <h1 style="font-size: 18px; margin-top:10px;">@503_alex_ff_mini</h1>
    </header>

    <main id="contenido">
        <div id="pantalla-chat">
            <h2 style="text-align:center; color:#00f2ff; margin-bottom:10px;">CHAT GLOBAL 🔥</h2>
            <div id="caja" class="caja-chat"></div>
            <div class="input-area">
                <input type="text" id="ins" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()">
                <button class="send" onclick="enviar()">🚀</button>
            </div>
        </div>
    </main>

    <nav class="menu">
        <button onclick="location.reload()">🏠<br>Inicio</button>
        <button onclick="alert('Pronto: Galería Global')">🖼️<br>Fotos</button>
        <button onclick="document.getElementById('ins').focus()">💬<br>Chat</button>
    </nav>

    <script>
        // CONFIGURACIÓN DE TU BASE DE DATOS (YA ESTÁ LISTA)
        const firebaseConfig = {
            databaseURL: "https://alex-ff-mini-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("mensajes");

        let nombre = localStorage.getItem('nombreUsuario');
        if(!nombre) {
            nombre = prompt("¿Cuál es tu nombre de crack?");
            if(!nombre) nombre = "Soldado_Anonimo";
            localStorage.setItem('nombreUsuario', nombre);
        }

        // FUNCIÓN PARA ENVIAR AL MUNDO REAL
        function enviar() {
            let i = document.getElementById('ins');
            if(i.value.trim() !== "") {
                db.push().set({
                    usuario: nombre,
                    texto: i.value,
                    fecha: Date.now()
                });
                i.value = "";
            }
        }

        // ESCUCHAR MENSAJES EN TIEMPO REAL
        db.limitToLast(20).on("child_added", (data) => {
            let m = data.val();
            let caja = document.getElementById('caja');
            let esMio = m.usuario === nombre ? "mio" : "";
            
            caja.innerHTML += `
                <div class="msg ${esMio}">
                    <b style="color:#00f2ff; font-size:12px;">@${m.usuario}</b><br>
                    ${m.texto}
                </div>`;
            caja.scrollTop = caja.scrollHeight;
        });
    </script>
</body>
</html>
